<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sax Video Girls | 🔥 প্রিমিয়াম 4K কালেকশন 2026</title>
    <meta name="description" content="দেশি, বলিউড, ভাইরাল সব হট sax video girls এর সেরা কালেকশন">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- Particles Canvas -->
    <canvas id="particlesCanvas"></canvas>

    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <div class="nav-brand">
                <i class="fas fa-fire"></i>
                <span>SaxVideoGirls</span>
            </div>
            <ul class="nav-menu">
                <li><a href="#home" class="nav-link active">হোম</a></li>
                <li><a href="#videos" class="nav-link">ভিডিও</a></li>
                <li><a href="#categories" class="nav-link">ক্যাটাগরি</a></li>
                <li><a href="admin/login.html" class="nav-link" target="_blank">Admin</a></li>
            </ul>
            <div class="hamburger">
                <span></span><span></span><span></span>
            </div>
        </nav>
    </header>

    <!-- Hero -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1 class="hero-title">🔥 Sax Video Girls 2026 🔥</h1>
            <p class="hero-desc">সবচেয়ে হট দেশি, বলিউড & ভাইরাল কালেকশন</p>
            <div class="hero-stats">
                <div class="stat">
                    <span class="stat-num" data-count="250">250K+</span>
                    <span>ভিডিও</span>
                </div>
                <div class="stat">
                    <span class="stat-num" data-count="75">75M+</span>
                    <span>ভিউজ</span>
                </div>
            </div>
            <button class="cta-btn" onclick="loadVideos()">ভিডিও দেখুন <i class="fas fa-play"></i></button>
        </div>
    </section>

    <!-- Videos Section -->
    <section id="videos" class="videos-section">
        <div class="container">
            <div class="section-header">
                <h2>🔥 ট্রেন্ডিং ভিডিও</h2>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">সব</button>
                    <button class="filter-btn" data-filter="desi">দেশি</button>
                    <button class="filter-btn" data-filter="bollywood">বলিউড</button>
                    <button class="filter-btn" data-filter="viral">ভাইরাল</button>
                </div>
            </div>
            <div class="videos-grid" id="videosGrid">
                <!-- Dynamic Videos -->
            </div>
        </div>
    </section>

    <!-- Categories -->
    <section id="categories" class="categories-section">
        <div class="container">
            <h2>📂 ক্যাটাগরি</h2>
            <div class="categories-grid" id="categoriesGrid">
                <!-- Dynamic Categories -->
            </div>
        </div>
    </section>

    <!-- Video Modal -->
    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <video id="player" controls></video>
            <div class="video-info">
                <h3 id="modalTitle"></h3>
                <div class="video-meta">
                    <span id="modalViews"></span>
                    <span id="modalDuration"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 SaxVideoGirls. সকল অধিকার সংরক্ষিত।</p>
        </div>
    </footer>

    <script src="frontend-script.js"></script>
</body>
</html>
